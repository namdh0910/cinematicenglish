<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17" />
      <stop offset="50%" stop-color="#141923" />
      <stop offset="100%" stop-color="#1b1428" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  
  <!-- Ambient Glow -->
  <circle cx="400" cy="225" r="300" fill="url(#glow)" />
  
  <!-- Content -->
  <g transform="translate(400, 225)" text-anchor="middle">
    <!-- Play Icon Outline -->
    <circle cx="0" cy="-40" r="36" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.2" />
    <path d="M-6 -50 L14 -40 L-6 -30 Z" fill="#ffffff" fill-opacity="0.8" />
    
    <!-- Title Text -->
    <text y="40" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="28" fill="url(#text-grad)" letter-spacing="4">CINEMATIC ENGLISH</text>
    <text y="70" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#8b5cf6" letter-spacing="2" fill-opacity="0.8">IMMERSIVE STORIES PLAYGROUND</text>
  </g>
</svg>
